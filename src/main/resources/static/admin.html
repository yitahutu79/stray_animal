<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台审核 - 流浪动物领养系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #2f241d;
            --muted: #76685d;
            --line: rgba(80, 57, 40, 0.12);
            --paper: rgba(255, 255, 255, 0.95);
            --accent: #2f6f61;
            --warm: #c8672e;
            --sun: #dfa14e;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(223, 161, 78, 0.18), transparent 22%),
                linear-gradient(180deg, #fcf8f2 0%, #f1ebe4 100%);
            color: var(--ink);
        }

        .topbar {
            background: rgba(28, 24, 21, 0.88);
            backdrop-filter: blur(10px);
        }

        .hero,
        .panel-card,
        .metric-card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--paper);
            box-shadow: 0 18px 38px rgba(73, 49, 31, 0.08);
        }

        .hero {
            background: linear-gradient(135deg, rgba(47, 111, 97, 0.96), rgba(53, 90, 116, 0.95));
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -60px;
            top: -70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
        }

        .metric-card {
            padding: 1.2rem;
            height: 100%;
        }

        .metric-card .value {
            font-size: 1.9rem;
            font-weight: 800;
        }

        .panel-card {
            padding: 1.35rem;
        }

        .table-shell {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
        }

        .table thead th {
            background: #f7f1ea;
            color: #5a4b3f;
            border-bottom-width: 1px;
        }

        .badge-soft {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.34rem 0.72rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-submitted { background: rgba(223, 161, 78, 0.18); color: #9a630e; }
        .badge-review { background: rgba(53, 90, 116, 0.14); color: #355a74; }
        .badge-approved { background: rgba(47, 111, 97, 0.14); color: var(--accent); }
        .badge-rejected { background: rgba(200, 103, 46, 0.14); color: var(--warm); }

        .small-note {
            color: rgba(255, 255, 255, 0.78);
        }

        .detail-text {
            max-width: 230px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .section-desc {
            color: var(--muted);
        }

        .followup-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255,255,255,0.82);
            padding: 0.95rem 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark topbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">审核中心</a>
        <div class="d-flex gap-2">
            <a href="/stats.html" class="btn btn-sm btn-outline-light">统计分析</a>
            <a href="/pet-admin.html" class="btn btn-sm btn-outline-light">宠物管理</a>
            <a href="/donation-admin.html" class="btn btn-sm btn-outline-light">捐赠管理</a>
            <a href="/index.html" class="btn btn-sm btn-outline-light">前台首页</a>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<main class="container my-4">
    <section class="hero p-4 mb-4">
        <div class="row g-4 align-items-center">
            <div class="col-lg-8">
                <div class="small text-uppercase mb-2" style="letter-spacing: 0.16em;">Review Workflow</div>
                <h1 class="h2 mb-3">把审核页做成真正能帮助判断的工作台，而不是一张很长的表格。</h1>
                <p class="small-note mb-0">
                    你可以按状态快速筛选、先看本批次申请规模，再逐条核对评分、理由、居住环境和经验，减少纯表格带来的阅读压力。
                </p>
            </div>
            <div class="col-lg-4">
                <div class="panel-card">
                    <label class="form-label">审核状态</label>
                    <select id="statusFilter" class="form-select mb-3">
                        <option value="SUBMITTED">待审核（SUBMITTED）</option>
                        <option value="UNDER_REVIEW">审核中（UNDER_REVIEW）</option>
                        <option value="APPROVED">已通过（APPROVED）</option>
                        <option value="REJECTED">已驳回（REJECTED）</option>
                    </select>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick="loadApplications()">刷新申请列表</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">当前状态申请数</div>
                <div class="value" id="metricCount">0</div>
                <div class="small text-muted">按当前筛选状态统计</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">平均匹配评分</div>
                <div class="value" id="metricScore">0</div>
                <div class="small text-muted">仅统计有评分的申请</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">有养宠经验占比</div>
                <div class="value" id="metricExperience">0%</div>
                <div class="small text-muted">辅助识别整体申请成熟度</div>
            </div>
        </div>
    </div>

    <section class="panel-card">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
            <div>
                <div class="section-title">领养申请审核</div>
                <div class="section-desc">保留完整字段，但通过颜色、标签和排版降低信息噪音。</div>
            </div>
        </div>

        <div id="adminAlert" class="mb-3"></div>

        <div class="table-shell">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>申请</th>
                        <th>申请人</th>
                        <th>动物</th>
                        <th>评分</th>
                        <th>系统评价</th>
                        <th>居住环境</th>
                        <th>经验与收入</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="adminApplicationBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="followupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">领养回访记录</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="followupApplicationId">
                <div class="mb-3">
                    <div class="section-title">已有回访</div>
                    <div id="followupList" class="d-grid gap-3 mt-2"></div>
                </div>
                <hr>
                <div class="section-title mb-2">新增回访</div>
                <form id="followupForm" onsubmit="submitFollowup(event)">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">回访时间</label>
                            <input type="datetime-local" class="form-control" id="visitTime">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">回访方式</label>
                            <select class="form-select" id="visitType">
                                <option value="PHONE">电话</option>
                                <option value="HOME">上门</option>
                                <option value="ONLINE">线上</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">回访结果</label>
                            <textarea class="form-control" id="visitResult" rows="3" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="visitNote" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="submit" form="followupForm" class="btn btn-primary">保存回访</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '';
    let followupModal;

    function formatDateTime(value) {
        return value ? value.replace('T', ' ') : '-';
    }

    function getStatusBadge(status) {
        if (status === 'APPROVED') return '<span class="badge-soft badge-approved">已通过</span>';
        if (status === 'REJECTED') return '<span class="badge-soft badge-rejected">已驳回</span>';
        if (status === 'UNDER_REVIEW') return '<span class="badge-soft badge-review">审核中</span>';
        return '<span class="badge-soft badge-submitted">待审核</span>';
    }

    async function loadApplications() {
        const status = document.getElementById('statusFilter').value;
        const params = new URLSearchParams({ status, page: '0', size: '50' });
        const resp = await fetch(`${API_BASE}/api/adoptions/admin?${params.toString()}`);

        const alertDiv = document.getElementById('adminAlert');
        const tbody = document.getElementById('adminApplicationBody');
        tbody.innerHTML = '';
        alertDiv.innerHTML = '';

        if (!resp.ok) {
            alertDiv.innerHTML = `<div class="alert alert-danger">加载失败：${await resp.text()}</div>`;
            return;
        }

        const page = await resp.json();
        const items = page.content || [];

        document.getElementById('metricCount').textContent = items.length;
        const scored = items.filter((item) => typeof item.score === 'number');
        const avgScore = scored.length ? (scored.reduce((sum, item) => sum + item.score, 0) / scored.length).toFixed(1) : '0';
        document.getElementById('metricScore').textContent = avgScore;
        const experiencedCount = items.filter((item) => (item.experience || '').trim()).length;
        document.getElementById('metricExperience').textContent = `${items.length ? Math.round(experiencedCount * 100 / items.length) : 0}%`;

        if (items.length === 0) {
            alertDiv.innerHTML = '<div class="alert alert-info">当前状态下暂无申请记录。</div>';
            return;
        }

        items.forEach((app) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <strong>#${app.id}</strong>
                    <div class="mt-2">${getStatusBadge(app.status || 'SUBMITTED')}</div>
                </td>
                <td>
                    <strong>${app.applicantName || '-'}</strong>
                    <div class="small text-muted">ID：${app.applicantId ?? '-'}</div>
                    <div class="small text-muted">${app.hasOtherPet ? '已有其他宠物' : '暂无其他宠物'}</div>
                </td>
                <td>
                    <strong>${app.animalName || '-'}</strong>
                    <div class="small text-muted">动物 ID：${app.animalId ?? '-'}</div>
                </td>
                <td>
                    <div class="fw-bold fs-5">${app.score ?? '-'}</div>
                    <div class="small text-muted">匹配评分</div>
                </td>
                <td class="detail-text">
                    <div title="${app.evaluation || ''}">${(app.evaluation || '暂无系统评价').slice(0, 90)}${(app.evaluation || '').length > 90 ? '...' : ''}</div>
                    <div class="small text-muted mt-2" title="${app.reason || ''}">理由：${(app.reason || '未填写').slice(0, 48)}${(app.reason || '').length > 48 ? '...' : ''}</div>
                </td>
                <td class="detail-text" title="${app.homeEnv || ''}">
                    ${(app.homeEnv || '未填写居住环境').slice(0, 72)}${(app.homeEnv || '').length > 72 ? '...' : ''}
                </td>
                <td>
                    <div><strong>${app.incomeLevel || '-'}</strong></div>
                    <div class="small text-muted" title="${app.experience || ''}">
                        ${(app.experience || '暂无养宠经验说明').slice(0, 60)}${(app.experience || '').length > 60 ? '...' : ''}
                    </div>
                </td>
                <td class="small text-muted">${formatDateTime(app.createTime)}</td>
                <td>
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-success" onclick="approve(${app.id})">通过</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="reject(${app.id})">驳回</button>
                        ${app.status === 'APPROVED' ? `<button class="btn btn-sm btn-outline-primary" onclick="openFollowupModal(${app.id})">回访记录</button>` : ''}
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function approve(id) {
        if (!confirm(`确认通过申请 #${id} 吗？`)) return;
        const resp = await fetch(`${API_BASE}/api/adoptions/${id}/status?status=APPROVED`, { method: 'PUT' });
        if (resp.ok) {
            alert(`已通过申请 #${id}`);
            loadApplications();
        } else {
            alert(`操作失败：${await resp.text()}`);
        }
    }

    async function reject(id) {
        const reason = prompt(`请输入驳回原因（申请 #${id}）：`);
        if (reason === null) return;
        const params = new URLSearchParams({ status: 'REJECTED', rejectReason: reason });
        const resp = await fetch(`${API_BASE}/api/adoptions/${id}/status?${params.toString()}`, { method: 'PUT' });
        if (resp.ok) {
            alert(`已驳回申请 #${id}`);
            loadApplications();
        } else {
            alert(`操作失败：${await resp.text()}`);
        }
    }

    async function loadFollowups(applicationId) {
        const resp = await fetch(`${API_BASE}/api/adoptions/${applicationId}/followups?page=0&size=20`);
        const page = await resp.json();
        const list = document.getElementById('followupList');
        list.innerHTML = '';

        if (!page.content || page.content.length === 0) {
            list.innerHTML = '<div class="alert alert-light border mb-0">这条申请还没有回访记录。</div>';
            return;
        }

        page.content.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'followup-item';
            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-start gap-3">
                    <div>
                        <strong>${item.visitType || '未标注方式'}</strong>
                        <div class="small text-muted mt-1">回访人：${item.staffName || '-'}</div>
                        <div class="mt-2">${item.visitResult || '-'}</div>
                        <div class="small text-muted mt-2">${item.note || ''}</div>
                    </div>
                    <div class="small text-muted">${formatDateTime(item.visitTime || item.createTime)}</div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    async function openFollowupModal(applicationId) {
        document.getElementById('followupApplicationId').value = applicationId;
        document.getElementById('followupForm').reset();
        document.getElementById('visitTime').value = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        await loadFollowups(applicationId);
        followupModal.show();
    }

    async function submitFollowup(event) {
        event.preventDefault();
        const applicationId = document.getElementById('followupApplicationId').value;
        const staffId = localStorage.getItem('currentUserId');
        if (!staffId) {
            alert('缺少当前工作人员 ID，请重新登录后再试。');
            return;
        }

        const body = {
            visitTime: document.getElementById('visitTime').value ? `${document.getElementById('visitTime').value}:00` : null,
            visitType: document.getElementById('visitType').value,
            visitResult: document.getElementById('visitResult').value,
            note: document.getElementById('visitNote').value
        };

        const resp = await fetch(`${API_BASE}/api/adoptions/${applicationId}/followups?staffId=${encodeURIComponent(staffId)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (resp.ok) {
            await loadFollowups(applicationId);
            document.getElementById('followupForm').reset();
            alert('回访记录已保存');
        } else {
            alert(`保存失败：${await resp.text()}`);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        followupModal = new bootstrap.Modal(document.getElementById('followupModal'));
        loadApplications();
    });

    function logout() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');
        localStorage.removeItem('currentUserType');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>

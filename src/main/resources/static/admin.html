<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流浪动物领养管理系统 - 后台审核</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">后台审核 - 流浪动物领养</a>
        <div class="d-flex gap-2">
            <a href="/index.html" class="btn btn-sm btn-outline-light">前台首页</a>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>领养申请审核</h2>
        <div class="d-flex align-items-center gap-2">
            <label class="form-label mb-0 small">状态：</label>
            <select id="statusFilter" class="form-select form-select-sm" style="width: 160px;">
                <option value="SUBMITTED">待审核（SUBMITTED）</option>
                <option value="UNDER_REVIEW">审核中（UNDER_REVIEW）</option>
                <option value="APPROVED">已通过（APPROVED）</option>
                <option value="REJECTED">已驳回（REJECTED）</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="loadApplications()">刷新</button>
        </div>
    </div>

    <div id="adminAlert"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>申请ID</th>
                <th>申请人ID</th>
                <th>申请人</th>
                <th>动物ID</th>
                <th>动物名称</th>
                <th>评分</th>
                <th>系统评价</th>
                <th>状态</th>
                <th>申请理由</th>
                <th>居住环境</th>
                <th>其他宠物</th>
                <th>收入水平</th>
                <th>养宠经验</th>
                <th>提交时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="adminApplicationBody">
            </tbody>
        </table>
    </div>
</main>

<script>
    const API_BASE = '';

    async function loadApplications() {
        const status = document.getElementById('statusFilter').value;
        const params = new URLSearchParams({ status, page: '0', size: '50' });
        const resp = await fetch(`${API_BASE}/api/adoptions/admin?${params.toString()}`);

        const alertDiv = document.getElementById('adminAlert');
        const tbody = document.getElementById('adminApplicationBody');
        tbody.innerHTML = '';
        alertDiv.innerHTML = '';

        if (!resp.ok) {
            const text = await resp.text();
            alertDiv.innerHTML = `<div class="alert alert-danger">加载失败：${text}</div>`;
            return;
        }

        const page = await resp.json();
        if (!page.content || page.content.length === 0) {
            alertDiv.innerHTML = '<div class="alert alert-info">当前状态下暂无申请记录。</div>';
            return;
        }

        page.content.forEach(app => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${app.id}</td>
                <td>${app.applicantId ?? '-'}</td>
                <td>${app.applicantName || '-'}</td>
                <td>${app.animalId ?? '-'}</td>
                <td>${app.animalName || '-'}</td>
                <td>${app.score ?? '-'}</td>
                <td class="small" style="max-width: 260px;" title="${app.evaluation || ''}">${(app.evaluation || '').slice(0, 50)}</td>
                <td>${app.status || ''}</td>
                <td class="small" style="max-width: 200px;" title="${app.reason || ''}">${(app.reason || '').slice(0, 40)}</td>
                <td class="small" style="max-width: 200px;" title="${app.homeEnv || ''}">${(app.homeEnv || '').slice(0, 40)}</td>
                <td>${app.hasOtherPet ? '有' : '无'}</td>
                <td>${app.incomeLevel || '-'}</td>
                <td class="small" style="max-width: 200px;" title="${app.experience || ''}">${(app.experience || '').slice(0, 40)}</td>
                <td>${(app.createTime || '').replace('T', ' ')}</td>
                <td>
                    <div class="btn-group btn-group-sm" role="group">
                        <button class="btn btn-success" onclick="approve(${app.id})">通过</button>
                        <button class="btn btn-danger" onclick="reject(${app.id})">驳回</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function approve(id) {
        if (!confirm(`确认通过申请 #${id} 吗？`)) return;
        const resp = await fetch(`${API_BASE}/api/adoptions/${id}/status?status=APPROVED`, {
            method: 'PUT'
        });
        if (resp.ok) {
            alert('已通过申请 #' + id);
            loadApplications();
        } else {
            const text = await resp.text();
            alert('操作失败：' + text);
        }
    }

    async function reject(id) {
        const reason = prompt(`请输入驳回原因（申请 #${id}）：`);
        if (reason === null) return; // 取消
        const params = new URLSearchParams({ status: 'REJECTED', rejectReason: reason });
        const resp = await fetch(`${API_BASE}/api/adoptions/${id}/status?${params.toString()}`, {
            method: 'PUT'
        });
        if (resp.ok) {
            alert('已驳回申请 #' + id);
            loadApplications();
        } else {
            const text = await resp.text();
            alert('操作失败：' + text);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadApplications();
    });

    function logout() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');
        localStorage.removeItem('currentUserType');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>

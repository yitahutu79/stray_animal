<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>捐赠管理 - 流浪动物领养系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">捐赠管理</a>
        <div class="d-flex gap-2">
            <a href="/index.html" class="btn btn-sm btn-outline-light">前台首页</a>
            <a href="/admin.html" class="btn btn-sm btn-outline-light">申请审核</a>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>捐赠记录管理</h2>
        <button class="btn btn-sm btn-primary" onclick="loadDonations()">刷新</button>
    </div>

    <div id="donationAdminAlert"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>捐赠人</th>
                <th>类型</th>
                <th>金额</th>
                <th>状态</th>
                <th>公开</th>
                <th>备注</th>
                <th>时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="donationAdminBody"></tbody>
        </table>
    </div>
</main>

<script>
    const API_BASE = '';

    async function loadDonations() {
        const params = new URLSearchParams({ page: '0', size: '50' });
        const resp = await fetch(`${API_BASE}/api/donations/admin?${params.toString()}`);
        const alertDiv = document.getElementById('donationAdminAlert');
        const tbody = document.getElementById('donationAdminBody');
        tbody.innerHTML = '';
        alertDiv.innerHTML = '';

        if (!resp.ok) {
            const text = await resp.text();
            alertDiv.innerHTML = `<div class="alert alert-danger">加载失败：${text}</div>`;
            return;
        }

        const page = await resp.json();
        if (!page.content || page.content.length === 0) {
            alertDiv.innerHTML = '<div class="alert alert-info">暂无捐赠记录。</div>';
            return;
        }

        page.content.forEach(d => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${d.id}</td>
                <td>${d.donorName || '爱心人士'}</td>
                <td>${d.type}</td>
                <td>${d.type === 'MONEY' ? (d.amount ?? 0) : '-'}</td>
                <td>${d.status}</td>
                <td>${d.publicFlag ? '是' : '否'}</td>
                <td class="small" style="max-width: 200px;">${d.remark || ''}</td>
                <td>${(d.createTime || '').replace('T',' ')}</td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-success" onclick="updateStatus(${d.id}, 'CONFIRMED')">确认</button>
                        <button class="btn btn-outline-primary" onclick="updateStatus(${d.id}, 'USED')">标记已使用</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function updateStatus(id, status) {
        if (!confirm(`确认将捐赠 #${id} 标记为 ${status} 吗？`)) return;
        const resp = await fetch(`${API_BASE}/api/donations/${id}/status?status=${status}`, {
            method: 'PUT'
        });
        if (resp.ok) {
            alert('状态已更新');
            loadDonations();
        } else {
            const text = await resp.text();
            alert('操作失败：' + text);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadDonations();
    });

    function logout() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');
        localStorage.removeItem('currentUserType');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>

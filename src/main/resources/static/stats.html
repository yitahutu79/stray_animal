<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据统计分析 - 流浪动物领养系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">数据统计分析</a>
        <div class="d-flex gap-2">
            <a href="/index.html" class="btn btn-sm btn-outline-light">前台首页</a>
            <a href="/admin.html" class="btn btn-sm btn-outline-light">申请审核</a>
            <a href="/pet-admin.html" class="btn btn-sm btn-outline-light">宠物管理</a>
            <a href="/donation-admin.html" class="btn btn-sm btn-outline-light">捐赠管理</a>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<main class="container my-4">
    <h2 class="mb-4">概览统计</h2>
    <div id="statsAlert"></div>

    <div class="row g-4" id="statsCards" style="display: none;">
        <div class="col-md-3">
            <div class="card text-bg-primary h-100">
                <div class="card-body">
                    <h5 class="card-title">动物总数</h5>
                    <p class="card-text display-6" id="totalAnimals">0</p>
                    <p class="card-text"><small>待领养：<span id="animalsWaiting">0</span>，已领养：<span id="animalsAdopted">0</span></small></p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-bg-success h-100">
                <div class="card-body">
                    <h5 class="card-title">领养申请</h5>
                    <p class="card-text display-6" id="totalApplications">0</p>
                    <p class="card-text"><small>已通过：<span id="approvedApplications">0</span></small></p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-bg-warning h-100">
                <div class="card-body">
                    <h5 class="card-title">捐赠总数</h5>
                    <p class="card-text display-6" id="totalDonations">0</p>
                    <p class="card-text"><small>记录条数</small></p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-bg-info h-100">
                <div class="card-body">
                    <h5 class="card-title">资金总额（元）</h5>
                    <p class="card-text display-6" id="totalMoneyAmount">0</p>
                    <p class="card-text"><small>仅统计资金捐赠</small></p>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const API_BASE = '';

    async function loadStats() {
        const alertDiv = document.getElementById('statsAlert');
        const cards = document.getElementById('statsCards');
        alertDiv.innerHTML = '';
        cards.style.display = 'none';

        const resp = await fetch(`${API_BASE}/api/admin/stats/overview`);
        if (!resp.ok) {
            const text = await resp.text();
            alertDiv.innerHTML = `<div class="alert alert-danger">加载统计数据失败：${text}</div>`;
            return;
        }
        const s = await resp.json();
        document.getElementById('totalAnimals').textContent = s.totalAnimals;
        document.getElementById('animalsWaiting').textContent = s.animalsWaiting;
        document.getElementById('animalsAdopted').textContent = s.animalsAdopted;
        document.getElementById('totalApplications').textContent = s.totalApplications;
        document.getElementById('approvedApplications').textContent = s.approvedApplications;
        document.getElementById('totalDonations').textContent = s.totalDonations;
        document.getElementById('totalMoneyAmount').textContent = s.totalMoneyAmount.toFixed(2);

        cards.style.display = 'flex';
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadStats();
    });

    function logout() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');
        localStorage.removeItem('currentUserType');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>

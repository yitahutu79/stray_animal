<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 / 注册 - 流浪动物领养管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(230, 172, 95, 0.22), transparent 24%),
                linear-gradient(180deg, #fcf8f1 0%, #f1ebe1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #2e241c;
        }

        .auth-shell {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: 1.05fr 1fr;
            background: rgba(255, 252, 247, 0.94);
            border: 1px solid rgba(97, 72, 47, 0.12);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(67, 46, 28, 0.12);
        }

        .brand-panel {
            padding: 42px;
            background: linear-gradient(160deg, rgba(47, 111, 97, 0.92), rgba(34, 70, 61, 0.92));
            color: #fff;
        }

        .brand-panel h1 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.12;
            margin-bottom: 18px;
        }

        .brand-panel p {
            color: rgba(255, 255, 255, 0.84);
            font-size: 1.02rem;
        }

        .bullet-card {
            margin-top: 26px;
            display: grid;
            gap: 14px;
        }

        .bullet-item {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 14px 16px;
        }

        .form-panel {
            padding: 34px;
        }

        .nav-pills .nav-link {
            color: #6c5b4e;
            border-radius: 999px;
        }

        .nav-pills .nav-link.active {
            background: #c8672e;
        }

        .panel-card {
            background: #fff;
            border: 1px solid rgba(90, 63, 42, 0.1);
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 14px 28px rgba(75, 48, 30, 0.08);
        }

        .hint {
            color: #75695f;
            font-size: 0.92rem;
        }

        @media (max-width: 960px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }

            .brand-panel,
            .form-panel {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<div class="auth-shell">
    <section class="brand-panel">
        <div class="small text-uppercase mb-3" style="letter-spacing: 0.18em;">Stray Animal Rescue</div>
        <h1>让救助、领养和捐助，在同一套系统里真正运转起来。</h1>
        <p>领养者可以直接注册账号、提交申请、追踪进度，也可以先用捐赠参与救助。管理端则能继续查看动物、申请和统计分析。</p>

        <div class="bullet-card">
            <div class="bullet-item">
                <strong>注册后即可使用领养前台</strong>
                <div class="hint text-white-50"></div>
            </div>
            <div class="bullet-item">
                <strong>管理端仍可直接登录</strong>
                <div class="hint text-white-50"></div>
            </div>
            <div class="bullet-item">
                <strong>支持后续统计闭环</strong>
                <div class="hint text-white-50"></div>
            </div>
        </div>
    </section>

    <section class="form-panel">
        <ul class="nav nav-pills mb-4" id="authTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#loginPane" type="button">登录</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#registerPane" type="button">注册</button>
            </li>
        </ul>

        <div id="authAlert" class="mb-3"></div>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="loginPane">
                <div class="panel-card">
                    <h3 class="h4 mb-3">登录系统</h3>
                    <form id="loginForm" onsubmit="doLogin(event)">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="loginUsername" placeholder="例如：adopter1 / admin" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">登录身份</label>
                            <select class="form-select" id="roleHint">
                                <option value="AUTO">自动识别（根据用户类型）</option>
                                <option value="ADOPTER">领养者</option>
                                <option value="ADMIN">管理员 / 工作人员</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                    <div class="mt-3 hint">
                        管理员账号仍建议由数据库预置；普通领养者可以直接在“注册”页创建账号。
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="registerPane">
                <div class="panel-card">
                    <h3 class="h4 mb-3">注册领养者账号</h3>
                    <form id="registerForm" onsubmit="doRegister(event)">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="registerUsername" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="registerPassword" minlength="6" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">姓名</label>
                                <input type="text" class="form-control" id="registerRealName">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">手机号</label>
                                <input type="text" class="form-control" id="registerPhone">
                            </div>
                            <div class="col-12">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="registerEmail">
                            </div>
                            <div class="col-12">
                                <label class="form-label">地址</label>
                                <input type="text" class="form-control" id="registerAddress">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-4">注册并进入前台</button>
                    </form>
                    <div class="mt-3 hint">
                        当前注册默认创建为 <code>ADOPTER</code> 账号，并自动登录进入前台首页。
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = '';

    function showAlert(type, message) {
        document.getElementById('authAlert').innerHTML = `<div class="alert alert-${type} mb-0">${message}</div>`;
    }

    function saveUserSession(data) {
        localStorage.setItem('currentUserId', data.userId);
        localStorage.setItem('currentUsername', data.username);
        localStorage.setItem('currentUserType', data.userType || '');
    }

    async function doLogin(event) {
        event.preventDefault();
        showAlert('info', '正在登录，请稍候...');

        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const roleHint = document.getElementById('roleHint').value;

        try {
            const resp = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!resp.ok) {
                showAlert('danger', `登录失败：${await resp.text()}`);
                return;
            }

            const data = await resp.json();
            saveUserSession(data);

            const type = (roleHint === 'AUTO' ? (data.userType || '') : roleHint).toUpperCase();
            window.location.href = type === 'ADOPTER' ? '/index.html' : '/stats.html';
        } catch (error) {
            showAlert('danger', `请求异常：${error}`);
        }
    }

    async function doRegister(event) {
        event.preventDefault();
        showAlert('info', '正在创建账号，请稍候...');

        const body = {
            username: document.getElementById('registerUsername').value.trim(),
            password: document.getElementById('registerPassword').value,
            realName: document.getElementById('registerRealName').value.trim(),
            phone: document.getElementById('registerPhone').value.trim(),
            email: document.getElementById('registerEmail').value.trim(),
            address: document.getElementById('registerAddress').value.trim(),
            userType: 'ADOPTER'
        };

        try {
            const resp = await fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!resp.ok) {
                showAlert('danger', `注册失败：${await resp.text()}`);
                return;
            }

            const data = await resp.json();
            saveUserSession(data);
            showAlert('success', '注册成功，正在进入领养前台...');
            window.location.href = '/index.html';
        } catch (error) {
            showAlert('danger', `请求异常：${error}`);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 流浪动物领养管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
        }
        .login-card {
            max-width: 420px;
            margin: 80px auto;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="card shadow-sm">
        <div class="card-header text-center bg-primary text-white">
            <h4 class="mb-0">流浪动物领养管理系统</h4>
        </div>
        <div class="card-body">
            <div id="loginAlert"></div>
            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" placeholder="例如：adopter1 / admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" placeholder="请输入密码（示例：123456）" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">登录身份</label>
                    <select class="form-select" id="roleHint">
                        <option value="AUTO">自动识别（根据用户类型）</option>
                        <option value="ADOPTER">领养者</option>
                        <option value="ADMIN">管理员 / 工作人员</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">登录</button>
            </form>
            <div class="mt-3 small text-muted">
                演示建议账号：<br>
                领养者：<code>adopter1</code><br>
                管理员：<code>admin</code>（需在数据库中配置）
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '';

    async function doLogin(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const roleHint = document.getElementById('roleHint').value;
        const alertDiv = document.getElementById('loginAlert');
        alertDiv.innerHTML = '';

        try {
            const resp = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (!resp.ok) {
                const text = await resp.text();
                alertDiv.innerHTML = `<div class="alert alert-danger">登录失败：${text}</div>`;
                return;
            }
            const data = await resp.json();
            // 保存当前用户信息到本地，供前台/后台页面使用
            localStorage.setItem('currentUserId', data.userId);
            localStorage.setItem('currentUsername', data.username);
            localStorage.setItem('currentUserType', data.userType || '');

            const type = (roleHint === 'AUTO' ? (data.userType || '') : roleHint).toUpperCase();

            if (type === 'ADOPTER') {
                window.location.href = '/index.html';
            } else {
                // 管理端默认跳转到统计页，统计页导航可以进入各管理页面
                window.location.href = '/stats.html';
            }
        } catch (e) {
            alertDiv.innerHTML = `<div class="alert alert-danger">请求异常：${e}</div>`;
        }
    }
</script>
</body>
</html>

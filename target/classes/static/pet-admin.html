<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>宠物信息管理 - 流浪动物领养系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #2f241d;
            --muted: #76685d;
            --line: rgba(80, 57, 40, 0.12);
            --paper: rgba(255, 255, 255, 0.96);
            --accent: #2f6f61;
            --warm: #c8672e;
        }

        body {
            background:
                radial-gradient(circle at top right, rgba(47, 111, 97, 0.12), transparent 24%),
                linear-gradient(180deg, #fcf8f2 0%, #f1ebe4 100%);
            color: var(--ink);
        }

        .topbar {
            background: rgba(28, 24, 21, 0.88);
            backdrop-filter: blur(10px);
        }

        .hero,
        .panel-card,
        .metric-card {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--paper);
            box-shadow: 0 18px 38px rgba(73, 49, 31, 0.08);
        }

        .hero {
            background: linear-gradient(135deg, rgba(47, 111, 97, 0.96), rgba(223, 161, 78, 0.92));
            color: #fff;
        }

        .metric-card {
            padding: 1.15rem;
            height: 100%;
        }

        .metric-card .value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .panel-card {
            padding: 1.35rem;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .section-desc {
            color: var(--muted);
        }

        .table-shell {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
        }

        .table thead th {
            background: #f7f1ea;
            color: #5a4b3f;
            border-bottom-width: 1px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .status-waiting { background: rgba(47, 111, 97, 0.14); color: var(--accent); }
        .status-progress { background: rgba(223, 161, 78, 0.18); color: #8e620c; }
        .status-adopted { background: rgba(53, 90, 116, 0.16); color: #355a74; }
        .status-care { background: rgba(200, 103, 46, 0.14); color: var(--warm); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark topbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">宠物档案中心</a>
        <div class="d-flex gap-2">
            <a href="/stats.html" class="btn btn-sm btn-outline-light">统计分析</a>
            <a href="/admin.html" class="btn btn-sm btn-outline-light">申请审核</a>
            <a href="/donation-admin.html" class="btn btn-sm btn-outline-light">捐赠管理</a>
            <a href="/index.html" class="btn btn-sm btn-outline-light">前台首页</a>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">退出登录</button>
        </div>
    </div>
</nav>

<main class="container my-4">
    <section class="hero p-4 mb-4">
        <div class="row g-4 align-items-center">
            <div class="col-lg-8">
                <div class="small text-uppercase mb-2" style="letter-spacing: 0.16em;">Animal Records</div>
                <h1 class="h2 mb-3">从“录入资料”升级成“管理档案”。</h1>
                <p class="mb-0" style="color: rgba(255,255,255,0.82);">
                    左侧专注于新建和编辑，右侧保留清晰的动物概览。这样既方便快速录入，也能减少来回切页查状态的成本。
                </p>
            </div>
            <div class="col-lg-4">
                <div class="panel-card">
                    <div class="section-title mb-1">当前列表筛选</div>
                    <div class="section-desc mb-3">按状态查看档案，便于集中更新同一批动物的资料。</div>
                    <div class="d-flex gap-2">
                        <select id="listStatus" class="form-select">
                            <option value="">全部状态</option>
                            <option value="待领养">待领养</option>
                            <option value="领养中">领养中</option>
                            <option value="已领养">已领养</option>
                            <option value="特别照顾">特别照顾</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadAnimals()">刷新</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">列表动物数</div>
                <div class="value" id="metricTotal">0</div>
                <div class="small text-muted">当前筛选结果</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">待领养数量</div>
                <div class="value" id="metricWaiting">0</div>
                <div class="small text-muted">适合优先完善展示信息</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="metric-card">
                <div class="text-muted">特别照顾数量</div>
                <div class="value" id="metricCare">0</div>
                <div class="small text-muted">便于关注治疗和护理负担</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <section class="panel-card">
                <div class="section-title">新增 / 编辑动物档案</div>
                <div class="section-desc mb-3">尽量把状态、健康和描述写完整，前台展示与统计分析都会直接受益。</div>
                <form id="animalForm" onsubmit="saveAnimal(event)">
                    <input type="hidden" id="animalId">
                    <div class="mb-3">
                        <label class="form-label">名称</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">种类</label>
                        <select class="form-select" id="species">
                            <option value="狗">狗</option>
                            <option value="猫">猫</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">品种</label>
                        <input type="text" class="form-control" id="breed">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <select class="form-select" id="gender">
                            <option value="公">公</option>
                            <option value="母">母</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">年龄（月）</label>
                            <input type="number" class="form-control" id="age">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">体重（kg）</label>
                            <input type="number" step="0.1" class="form-control" id="weight">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">颜色</label>
                        <input type="text" class="form-control" id="color">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">健康状况</label>
                        <input type="text" class="form-control" id="healthStatus">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">图片上传</label>
                        <input type="file" class="form-control" id="photoFile" accept="image/*">
                        <input type="hidden" id="photoUrl">
                        <div id="photoPreview" class="mt-2" style="display: none;">
                            <img src="" alt="预览" style="max-width: 100%; height: auto; border-radius: 8px;">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="vaccinated">
                                <label class="form-check-label" for="vaccinated">已免疫</label>
                            </div>
                        </div>
                        <div class="col-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="neutered">
                                <label class="form-check-label" for="neutered">已绝育</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性格特点</label>
                        <input type="text" class="form-control" id="characterFeature">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="status">
                            <option value="待领养">待领养</option>
                            <option value="领养中">领养中</option>
                            <option value="已领养">已领养</option>
                            <option value="特别照顾">特别照顾</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">详细描述</label>
                        <textarea class="form-control" id="description" rows="4"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">保存档案</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">清空</button>
                    </div>
                </form>
            </section>
        </div>

        <div class="col-lg-8">
            <section class="panel-card">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
                    <div>
                        <div class="section-title">动物列表</div>
                        <div class="section-desc">支持快速编辑和删除，同时用标签强化状态识别。</div>
                    </div>
                </div>
                <div class="table-shell">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>种类 / 品种</th>
                                <th>状态</th>
                                <th>年龄</th>
                                <th>健康</th>
                                <th>图片</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="animalTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<script>
    const API_BASE = '';

    function getStatusPill(status) {
        if (status === '待领养') return '<span class="status-pill status-waiting">待领养</span>';
        if (status === '领养中') return '<span class="status-pill status-progress">领养中</span>';
        if (status === '已领养') return '<span class="status-pill status-adopted">已领养</span>';
        return '<span class="status-pill status-care">特别照顾</span>';
    }

    async function loadAnimals() {
        const status = document.getElementById('listStatus').value;
        const params = new URLSearchParams({ page: '0', size: '50' });
        if (status) params.append('status', status);
        const resp = await fetch(`${API_BASE}/api/animals?${params.toString()}`);
        const page = await resp.json();
        const items = page.content || [];
        const tbody = document.getElementById('animalTableBody');
        tbody.innerHTML = '';

        document.getElementById('metricTotal').textContent = items.length;
        document.getElementById('metricWaiting').textContent = items.filter((a) => a.status === '待领养').length;
        document.getElementById('metricCare').textContent = items.filter((a) => a.status === '特别照顾').length;

        items.forEach((animal) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>#${animal.id}</strong></td>
                <td>
                    <strong>${animal.name}</strong>
                    <div class="small text-muted">${animal.gender || ''}</div>
                </td>
                <td>
                    <div>${animal.species || '-'}</div>
                    <div class="small text-muted">${animal.breed || '未填写品种'}</div>
                </td>
                <td>${getStatusPill(animal.status || '待领养')}</td>
                <td>${animal.age ?? '-'} 月</td>
                <td class="small text-muted">${animal.healthStatus || '待补充健康信息'}</td>
                <td class="small text-muted">${animal.photoUrl ? '已设置' : '未设置'}</td>
                <td>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-primary" onclick='editAnimal(${JSON.stringify(animal).replace(/'/g, "&apos;")})'>编辑</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteAnimal(${animal.id})">删除</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function editAnimal(animal) {
        document.getElementById('animalId').value = animal.id;
        document.getElementById('name').value = animal.name || '';
        document.getElementById('species').value = animal.species || '狗';
        document.getElementById('breed').value = animal.breed || '';
        document.getElementById('gender').value = animal.gender || '公';
        document.getElementById('age').value = animal.age ?? '';
        document.getElementById('weight').value = animal.weight ?? '';
        document.getElementById('color').value = animal.color || '';
        document.getElementById('healthStatus').value = animal.healthStatus || '';
        
        // 处理图片预览
        const photoUrl = animal.photoUrl || '';
        document.getElementById('photoUrl').value = photoUrl;
        const preview = document.getElementById('photoPreview');
        const previewImg = preview.querySelector('img');
        if (photoUrl) {
            previewImg.src = photoUrl;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
        document.getElementById('photoFile').value = ''; // 清空文件选择

        document.getElementById('vaccinated').checked = !!animal.vaccinated;
        document.getElementById('neutered').checked = !!animal.neutered;
        document.getElementById('characterFeature').value = animal.characterFeature || '';
        document.getElementById('status').value = animal.status || '待领养';
        document.getElementById('description').value = animal.description || '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('animalForm').reset();
        document.getElementById('animalId').value = '';
        document.getElementById('photoUrl').value = '';
        document.getElementById('photoPreview').style.display = 'none';
    }

    async function saveAnimal(event) {
        event.preventDefault();
        const id = document.getElementById('animalId').value;
        
        // 先处理图片上传
        const fileInput = document.getElementById('photoFile');
        let photoUrl = document.getElementById('photoUrl').value;
        
        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const uploadResp = await fetch(`${API_BASE}/api/upload`, {
                    method: 'POST',
                    body: formData
                });
                if (uploadResp.ok) {
                    photoUrl = await uploadResp.text();
                } else {
                    const errorMsg = await uploadResp.text();
                    alert(`图片上传失败：${errorMsg}`);
                    return;
                }
            } catch (err) {
                alert(`图片上传发生错误：${err.message}`);
                return;
            }
        }

        const body = {
            name: document.getElementById('name').value,
            species: document.getElementById('species').value,
            breed: document.getElementById('breed').value,
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value ? Number(document.getElementById('age').value) : null,
            weight: document.getElementById('weight').value ? Number(document.getElementById('weight').value) : null,
            color: document.getElementById('color').value,
            healthStatus: document.getElementById('healthStatus').value,
            photoUrl: photoUrl,
            vaccinated: document.getElementById('vaccinated').checked,
            neutered: document.getElementById('neutered').checked,
            characterFeature: document.getElementById('characterFeature').value,
            status: document.getElementById('status').value,
            description: document.getElementById('description').value
        };

        let url = `${API_BASE}/api/animals`;
        let method = 'POST';
        if (id) {
            url = `${API_BASE}/api/animals/${id}`;
            method = 'PUT';
        }

        const resp = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (resp.ok) {
            alert('保存成功');
            resetForm();
            loadAnimals();
        } else {
            alert(`保存失败：${await resp.text()}`);
        }
    }

    async function deleteAnimal(id) {
        if (!confirm(`确认删除动物 #${id} 吗？`)) return;
        const resp = await fetch(`${API_BASE}/api/animals/${id}`, { method: 'DELETE' });
        if (resp.ok) {
            alert('删除成功');
            loadAnimals();
        } else {
            alert(`删除失败：${await resp.text()}`);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadAnimals();
        
        // 图片选择预览
        document.getElementById('photoFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('photoPreview');
                    const previewImg = preview.querySelector('img');
                    previewImg.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });
    });

    function logout() {
        localStorage.removeItem('currentUserId');
        localStorage.removeItem('currentUsername');
        localStorage.removeItem('currentUserType');
        window.location.href = '/login.html';
    }
</script>
</body>
</html>
